name: Build desktop packages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-x64:
    name: Windows x64 (NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Windows x64 installer
        shell: pwsh
        run: >-
          npx --yes @tauri-apps/cli@2.11.4 build
          --target x86_64-pc-windows-msvc
          --config src-tauri/tauri.windows.conf.json
          --bundles nsis

      - name: Upload Windows x64 installer
        uses: actions/upload-artifact@v4
        with:
          name: IINA-windows-x64
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  macos-arm64:
    name: macOS arm64 (app and DMG)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Prepare pinned IINA and Sparkle packaging inputs
        run: bash scripts/prepare-macos-ci.sh

      - name: Fetch Rust dependencies
        run: cargo fetch --locked --manifest-path src-tauri/Cargo.toml

      - name: Build macOS arm64 app and DMG
        env:
          IIMA_DMG_ARCH: aarch64
        run: npm run package:mac

      - name: Archive app bundle
        run: ditto -c -k --sequesterRsrc --keepParent src-tauri/target/release/bundle/macos/IINA.app IINA_0.9.0_macos_arm64.app.zip

      - name: Upload macOS arm64 packages
        uses: actions/upload-artifact@v4
        with:
          name: IINA-macos-arm64
          path: |
            IINA_0.9.0_macos_arm64.app.zip
            src-tauri/target/release/bundle/dmg/IINA_0.9.0_aarch64_bundled_libmpv.dmg
          if-no-files-found: error
