name: Build desktop packages

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-metadata:
    name: Validate package version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.package.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate release tag
        id: package
        shell: bash
        run: |
          package_version="$(node --print "require('./package.json').version")"
          tauri_version="$(node --print "require('./src-tauri/tauri.conf.json').version")"

          if [[ "$package_version" != "$tauri_version" ]]; then
            printf 'package.json version %s does not match Tauri version %s\n' \
              "$package_version" "$tauri_version" >&2
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/* && "$GITHUB_REF_NAME" != "v$package_version" ]]; then
            printf 'Release tag %s does not match package version v%s\n' \
              "$GITHUB_REF_NAME" "$package_version" >&2
            exit 1
          fi

          printf 'version=%s\n' "$package_version" >> "$GITHUB_OUTPUT"

  windows-x64:
    name: Windows x64 (NSIS)
    needs: release-metadata
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Windows x64 installer
        shell: pwsh
        run: >-
          npx --yes @tauri-apps/cli@2.11.4 build
          --target x86_64-pc-windows-msvc
          --config src-tauri/tauri.windows.conf.json
          --bundles nsis

      - name: Upload Windows x64 installer
        uses: actions/upload-artifact@v4
        with:
          name: IINA-windows-x64
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  macos-arm64:
    name: macOS arm64 (app and DMG)
    needs: release-metadata
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Prepare pinned IINA and Sparkle packaging inputs
        run: bash scripts/prepare-macos-ci.sh

      - name: Fetch Rust dependencies
        run: cargo fetch --locked --manifest-path src-tauri/Cargo.toml

      - name: Build macOS arm64 app and DMG
        env:
          IIMA_DMG_ARCH: aarch64
        run: npm run package:mac

      - name: Archive app bundle
        run: >-
          ditto -c -k --sequesterRsrc --keepParent
          src-tauri/target/release/bundle/macos/IINA.app
          IINA_${{ needs.release-metadata.outputs.version }}_macos_arm64.app.zip

      - name: Upload macOS arm64 packages
        uses: actions/upload-artifact@v4
        with:
          name: IINA-macos-arm64
          path: |
            IINA_*_macos_arm64.app.zip
            src-tauri/target/release/bundle/dmg/IINA_*_aarch64_bundled_libmpv.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-metadata
      - windows-x64
      - macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish tagged release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' assets < <(
            find release-assets -type f \
              \( -name '*.exe' -o -name '*.zip' -o -name '*.dmg' \) \
              -print0
          )

          if [[ "${#assets[@]}" -ne 3 ]]; then
            printf 'Expected 3 release packages, found %s\n' "${#assets[@]}" >&2
            printf '%s\n' "${assets[@]}" >&2
            exit 1
          fi

          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --verify-tag \
            --title "IINA ${{ needs.release-metadata.outputs.version }}" \
            --generate-notes
